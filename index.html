<style>
:root{
    --bg:#111;
    --panel:#1a1a1a;
    --accent:darkorange;
    --text:#fff;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:1000;
    border-bottom:2px solid var(--accent);
}

.logo{
    font-weight:bold;
    font-size:20px;
    color:var(--accent);
}

nav{
    display:flex;
    gap:20px;
}

nav a{
    color:#fff;
    text-decoration:none;
}

.hamburger{
    display:none;
    font-size:24px;
    cursor:pointer;
}



/* Code for Scrolling sidebar starts here */

/* container */

.container{
    display:flex;
    position:absolute;
    top:60px;
    bottom:40px;
    width:100%;
}

/* SIDEBAR */
.sidebar{
    width:120px;
    background:var(--panel);
    overflow-y:auto;
    padding:10px;
}

/* Scrollbar styling */
::-webkit-scrollbar{
    width:8px;
}
::-webkit-scrollbar-thumb{
    background:var(--accent);
    border-radius:4px;
}

.channel{
    margin-bottom:15px;
    cursor:pointer;
    outline:none;
}

.channel img{
    width:100%;
    border-radius:8px;
}

.channel-name{
    text-align:center;
    margin-top:5px;
    font-size:14px;
}

/* Focus highlight for Firestick */
.channel:focus {
  border: 2px solid darkorange;
}



/* PLAYER AREA */
.main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:black;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* Overlay watermark */
.watermark{
    position:absolute;
    top:10px;
    left:10px;
    background:#000;
    color:#fff;
    padding:5px 10px;
    font-size:14px;
	 opacity:0.8;
}

/* Stream health indicator */
.health{
    position:absolute;
    top:10px;
    right:10px;
    width:15px;
    height:15px;
    border-radius:50%;
    background:red;
}

/* Buffer meter */
.bufferMeter{
    position:absolute;
    bottom:10px;
    left:10px;
    background:#000;
    color:#fff;
    padding:5px 10px;
}

.meter-title {
  font-size: 11px;
  opacity: 0.7;
  margin-bottom: 4px;
}

/* FOOTER */
footer{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:40px;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    border-top:2px solid var(--accent);
}

/* MOBILE */
@media(max-width:768px){
    .sidebar{
        position:absolute;
        left:-260px;
        top:0;
        bottom:0;
        transition:0.3s;
        z-index:999;
    }
    .sidebar.active{
        left:0;
    }
    .hamburger{
        display:block;
    }
    nav{
        display:none;
    }
}
</style>

const sidebar = document.getElementById("sidebar");
const video = document.getElementById("video");
const overlayText = document.getElementById("overlayText");
const healthDot = document.getElementById("healthDot");
const bitrateValue = document.getElementById('bitrateValue');
const bitrateDisplay = document.getElementById("bitrateDisplay");
const resolutionValue = document.getElementById('resolutionValue')
let hls;
let currentIndex = 0;
let reconnectAttempts = 0;

if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource('YOUR_M3U8_URL');
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
        updateBitrate();
    });

    hls.on(Hls.Events.LEVEL_SWITCHED, function () {
        updateBitrate();
    });

    function updateBitrate() {
        const level = hls.levels[hls.currentLevel];
        if (level) {
            const bitrateMbps = (level.bitrate / 1000000).toFixed(2);
            bitrateValue.textContent = bitrateMbps + " Mbps";
            resolutionValue.textContent = level.width + " x " + level.height;
        }
    }
}


/* Build channel list */
channels.forEach((ch,index)=>{
    const div=document.createElement("div");
    div.className="channel";
    div.tabIndex=0;
    const img=document.createElement("img");
  img.src="https://via.placeholder.com/120x120?text=Loading...";
  div.appendChild(img);

  const name=document.createElement("div");
  name.className="channel-name";
  name.innerText=ch.name;
  div.appendChild(name);

  div.onclick=()=>playChannel(index);
  sidebar.appendChild(div);

  captureThumbnail(ch.url,img);
  });
  
  

/* Load channel */
function captureThumbnail(url,img){
  const tempVideo=document.createElement("video");
  tempVideo.crossOrigin="anonymous";
  if(Hls.isSupported()){
    const tempHls=new Hls();
    tempHls.loadSource(url);
    tempHls.attachMedia(tempVideo);
    tempHls.on(Hls.Events.MANIFEST_PARSED,()=>{
      tempVideo.play();
      setTimeout(()=>{
        const canvas=document.createElement("canvas");
        canvas.width=300;
        canvas.height=170;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(tempVideo,0,0,300,170);
        img.src=canvas.toDataURL();
        tempHls.destroy();
      },3000);
    });
  }
}

function playChannel(index){
  currentIndex=index;
  const channel=channels[index];
  watermark.innerText=channel.name;

  if(hls) hls.destroy();
  
  
  
  

  if(Hls.isSupported()){
    hls=new Hls({enableWorker:true, lowLatencyMode:true});
    hls.loadSource(channel.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());

    hls.on(Hls.Events.ERROR,(event,data)=>{
      health.style.background="red";
      if(data.fatal){
        setTimeout(()=>playChannel(currentIndex),3000);
      }
    });

    health.style.background="green";
  }
}



/* Buffer meter */
setInterval(()=>{
    if(video.buffered.length){
        const buffer=video.buffered.end(0)-video.currentTime;
        document.getElementById("buffer").innerText=buffer.toFixed(1);
    }
},1000);


	

/* Silent refresh */
setInterval(()=>{
    if(video.readyState===0){
        loadChannel(currentIndex);
    }
},15000);

/* Remote navigation */
document.addEventListener("keydown",function(e){
    if(e.key==="ArrowDown"){
        currentIndex=(currentIndex+1)%channels.length;
        loadChannel(currentIndex);
    }
    if(e.key==="ArrowUp"){
        currentIndex=(currentIndex-1+channels.length)%channels.length;
        loadChannel(currentIndex);
    }
});

/* Hamburger */
function toggleMenu(){
    sidebar.classList.toggle("active");
}

/* Auto hide controls */
let hideTimeout;
video.addEventListener("mousemove",()=>{
    video.controls=true;
    clearTimeout(hideTimeout);
    hideTimeout=setTimeout(()=>video.controls=false,3000);
});

loadChannel(0);
</script>
